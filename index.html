<body>
<div id="header"></div>
<div id="map"></div>
<div class="map-stats" id="stats">載入中…</div>
<div class="replay-year" id="replay-year" hidden></div>

<!-- 歡迎卡（說明書風格）：首次來訪自動顯示，之後可用右下角 📖 再打開 -->
<div class="welcome-backdrop" id="welcome" hidden>
  <div class="welcome-card" role="dialog" aria-labelledby="wc-title">
    <button class="wc-close" id="wc-close" aria-label="關閉">✕</button>
    <div class="wc-sticker">🗺️</div>
    <h2 id="wc-title">歡迎來到 <em>Eva's Travel Map</em> ✈️</h2>
    <p class="wc-lead">這裡收藏了我 <b>38 個國家、50 趟旅程</b>的回憶——行程、花費、口袋名單、遊記，全部整理在這張地圖上。</p>
    <div class="wc-tips">
      <div>🌍 <b>點國旗圖釘</b><span>看那一趟的完整紀錄</span></div>
      <div>📍 <b>口袋名單</b><span>我存過的美食、景點、購物清單</span></div>
      <div>✍️ <b>遊記</b><span>各國的故事慢慢讀</span></div>
    </div>
    <p class="wc-ask">有建議或想看的內容嗎？來 IG 跟我說 💬</p>
    <div class="wc-actions">
      <button class="wc-btn primary" id="wc-go">開始探索 🧭</button>
      <a class="wc-btn ig" href="https://www.instagram.com/yiiihua_0319/" target="_blank" rel="noopener">📸 @yiiihua_0319</a>
    </div>
  </div>
</div>
<button class="about-chip" id="about-chip" hidden>📖 關於這裡</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="js/common.js"></script>
<script>
document.getElementById('header').outerHTML = headerHTML('map');

// ── 歡迎卡：第一次來訪自動打開，之後右下角 📖 隨時可再看 ──
{
  const wc = document.getElementById('welcome');
  const chip = document.getElementById('about-chip');
  const open = () => { wc.hidden = false; chip.hidden = true; };
  const close = () => { wc.hidden = true; chip.hidden = false; localStorage.setItem('tm_welcome_seen', '1'); };
  if (localStorage.getItem('tm_welcome_seen')) chip.hidden = false; else open();
  document.getElementById('wc-go').onclick = close;
  document.getElementById('wc-close').onclick = close;
  wc.addEventListener('click', e => { if (e.target === wc) close(); });
  chip.onclick = open;
}

(async () => {
  const [tripsData, countries] = await Promise.all([
    loadJSON('data/trips.json'),
    loadJSON('data/countries.json')
  ]);
  const trips = tripsData.trips;

  const map = L.map('map', { worldCopyJump: true, zoomControl: true })
    .setView([30, 40], 2.4);
  // 無文字底圖（CARTO 標籤混簡中、Esri 英文疊層又醜——重點是圖釘，乾淨最可愛）
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 12
  }).addTo(map);

  // 依城市合併圖釘
  const cityMap = new Map();
  for (const t of trips) {
    for (const c of (t.cities || [])) {
      const key = c.lat.toFixed(2) + ',' + c.lng.toFixed(2);
      if (!cityMap.has(key)) cityMap.set(key, { ...c, trips: [] });
      cityMap.get(key).trips.push(t);
    }
  }

  // 擠在一起的圖釘聚成小球：顯示成員中最多城市的那國國旗 + 右下數字
  const cluster = L.markerClusterGroup({
    maxClusterRadius: 42,
    showCoverageOnHover: false,
    iconCreateFunction: c => {
      const freq = {};
      for (const m of c.getAllChildMarkers()) if (m.options.cc) freq[m.options.cc] = (freq[m.options.cc] || 0) + 1;
      const top = Object.keys(freq).sort((a, b) => freq[b] - freq[a])[0];
      const emoji = top ? flagEmoji(top) : '✈️';
      return L.divIcon({
        className: 'cpin',
        html: `<span class="cpin-i cclu">${emoji}<b>${c.getChildCount()}</b></span>`,
        iconSize: [38, 38], iconAnchor: [19, 19]
      });
    }
  });

  // 國旗小圓釘 + 錯落彈出動畫（回放時會用新的 delay 重設 icon，讓動畫重播）
  const mkIcon = (city, delay) => L.divIcon({
    className: 'cpin',
    html: `<span class="cpin-i" style="animation-delay:${delay}ms">${city.cc ? flagEmoji(city.cc) : '✈️'}</span>`,
    iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -14]
  });

  let pi = 0;
  const markersByYear = {};   // 城市首次造訪年份 → markers（給足跡回放用）
  for (const city of cityMap.values()) {
    const marker = L.marker([city.lat, city.lng], { icon: mkIcon(city, Math.min(pi++ * 12, 1200)), cc: city.cc });
    const firstYear = Math.min(...city.trips.map(t => +t.dateStart.slice(0, 4)));
    (markersByYear[firstYear] = markersByYear[firstYear] || []).push({ marker, city });
    cluster.addLayer(marker);
    const rows = city.trips.map(t => {
      // 只連到這個城市所屬的國家（多國旅程不再列出全部國家）
      const ccs = city.cc ? [city.cc] : t.countries;
      const links = ccs.map(cc =>
        `<a href="country.html?c=${cc}&t=${t.id}">${flagEmoji(cc)} ${countries[cc]?.name || cc}</a>`).join(' ');
      // 標題去掉國名前綴（下一行已有國旗＋國名）：日本福岡關西 → 福岡關西
      const cn = city.cc && countries[city.cc]?.name;
      const title = (cn && t.title.startsWith(cn) && t.title.length > cn.length) ? t.title.slice(cn.length) : t.title;
      return `<div class="pin-trip">${fmtRange(t)}｜${title}<br>${links} <a class="fly-link" href="#" data-fly="${t.id}">🧭 行程軌跡</a></div>`;
    }).join('<hr style="border:none;border-top:1px solid #eee;margin:6px 0">');
    marker.bindPopup(`<div class="pin-city">📍 ${city.name}</div>${rows}`);
  }
  map.addLayer(cluster);

  // ── 自製繁體中文地名層（底圖無字；縮小看洲/海洋，放大看造訪國家）──
  const LBL_CONT = [['亞洲', 47, 95], ['歐洲', 57, 40], ['非洲', 9, 21], ['北美洲', 50, -100], ['南美洲', -14, -60], ['大洋洲', -26, 140]];
  const LBL_OCEAN = [['太平洋', 3, -155], ['大西洋', 12, -38], ['印度洋', -22, 82]];
  const CTR_OVERRIDE = { US: [39.5, -98], CN: [33, 103], NO: [61.5, 9], JP: [37.5, 138.5], GB: [53.8, -3.6] };
  const ctrByCc = {};
  for (const t of trips) for (const c of (t.cities || [])) if (c.cc) (ctrByCc[c.cc] = ctrByCc[c.cc] || []).push([c.lat, c.lng]);
  const LBL_CTRY = Object.entries(ctrByCc).map(([cc, pts]) => {
    const [lat, lng] = CTR_OVERRIDE[cc] ||
      [pts.reduce((s, p) => s + p[0], 0) / pts.length, pts.reduce((s, p) => s + p[1], 0) / pts.length];
    return [countries[cc]?.name || cc, lat, lng];
  });
  const mkLabel = (n, lat, lng, cls) => L.marker([lat, lng], {
    icon: L.divIcon({ className: 'mlbl-wrap', html: `<span class="mlbl ${cls}">${n}</span>`, iconSize: [0, 0] }),
    interactive: false, keyboard: false
  });
  const contLayer = L.layerGroup([
    ...LBL_CONT.map(([n, a, b]) => mkLabel(n, a, b, 'mlbl-cont')),
    ...LBL_OCEAN.map(([n, a, b]) => mkLabel(n, a, b, 'mlbl-ocean'))]);
  const ctryLayer = L.layerGroup(LBL_CTRY.map(([n, a, b]) => mkLabel(n, a, b, 'mlbl-ctry')));
  const syncLabels = () => {
    const z = map.getZoom();
    if (z < 4.5) { map.addLayer(contLayer); map.removeLayer(ctryLayer); }
    else { map.removeLayer(contLayer); map.addLayer(ctryLayer); }
  };
  map.on('zoomend', syncLabels);
  syncLabels();

  // ── 統計數字動畫 + 足跡回放 ──
  const tripDays = t => Math.round((new Date(t.dateEnd) - new Date(t.dateStart)) / 86400000) + 1;
  const years = Object.keys(markersByYear).map(Number).sort((a, b) => a - b);

  // 每年的「累積」統計：到該年為止去過幾國、幾趟、幾天
  const cumStats = {};
  for (const y of years) {
    const upTo = trips.filter(t => +t.dateStart.slice(0, 4) <= y);
    cumStats[y] = {
      c: new Set(upTo.flatMap(t => t.countries)).size,
      t: upTo.length,
      d: upTo.reduce((s, t) => s + tripDays(t), 0)
    };
  }
  const finalY = years[years.length - 1];

  document.getElementById('stats').innerHTML = `
    <div class="ms-nums">
      <div class="ms-stat"><b id="ms-c">0</b><span>🌍 國家</span></div>
      <div class="ms-stat"><b id="ms-t">0</b><span>✈️ 旅程</span></div>
      <div class="ms-stat"><b id="ms-d">0</b><span>📅 天</span></div>
    </div>
    <button class="ms-replay" id="ms-replay">▶ 足跡回放</button>
    <button class="ms-replay" id="ms-flyall">🛫 飛行回放</button>
    <div class="ms-hint">👆 點圖釘看旅程，點國家進遊記</div>`;

  // 數字滾動動畫（easeOutCubic）
  function countUp(id, to, dur = 1000) {
    const el = document.getElementById(id);
    const from = +(el.dataset.v || 0);
    el.dataset.v = to;
    const t0 = performance.now();
    const ease = x => 1 - Math.pow(1 - x, 3);
    (function frame(now) {
      const p = Math.min(1, (now - t0) / dur);
      el.textContent = Math.round(from + (to - from) * ease(p)).toLocaleString();
      if (p < 1) requestAnimationFrame(frame);
    })(t0);
  }
  const setStats = (s, dur) => { countUp('ms-c', s.c, dur); countUp('ms-t', s.t, dur); countUp('ms-d', s.d, dur); };
  setStats(cumStats[finalY], 1400);

  // 足跡回放：清空圖釘，一年一年彈回地圖上
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const yearEl = document.getElementById('replay-year');
  const replayBtn = document.getElementById('ms-replay');
  replayBtn.onclick = async () => {
    replayBtn.disabled = true;
    cluster.clearLayers();
    for (const id of ['ms-c', 'ms-t', 'ms-d']) { const el = document.getElementById(id); el.dataset.v = 0; el.textContent = '0'; }
    await sleep(350);
    for (const y of years) {
      yearEl.textContent = y;
      yearEl.hidden = false;
      yearEl.classList.remove('ry-in'); void yearEl.offsetWidth;  // 重新觸發進場動畫
      yearEl.classList.add('ry-in');
      let i = 0;
      for (const { marker, city } of markersByYear[y]) {
        marker.setIcon(mkIcon(city, Math.min(i++ * 70, 1000)));
        cluster.addLayer(marker);
      }
      setStats(cumStats[y], 1100);
      await sleep(1900);
    }
    yearEl.hidden = true;
    replayBtn.disabled = false;
  };

  // ── 飛行軌跡動畫（Flighty 風）：popup 內每趟旅程可點「✈️ 飛行軌跡」──
  // 出發基地依旅程日期判斷：台北 → 曼徹斯特(歐洲交換) → 台北 → 洛杉磯(USC) → 台北(回台實習)
  const HOME_BASES = [
    ['2000-01-01', '台北', 25.033, 121.5654, 'TW'],
    ['2023-09-01', '曼徹斯特', 53.4808, -2.2426, 'GB', '🎒 出發去英國交換'],
    ['2024-06-20', '台北', 25.033, 121.5654, 'TW', '🏠 交換結束，回台北'],
    ['2025-08-01', '洛杉磯', 34.0522, -118.2437, 'US', '🎓 出發去 USC'],
    ['2026-05-15', '台北', 25.033, 121.5654, 'TW', '🏠 回台北實習'],
    ['2026-08-01', '洛杉磯', 34.0522, -118.2437, 'US', '🎒 搬家去美國']
  ];
  const homeFor = t => { let h = HOME_BASES[0]; for (const b of HOME_BASES) if (b[0] <= t.dateStart) h = b; return h; };

  const rad = d => d * Math.PI / 180, deg = r => r * 180 / Math.PI;
  const distKm = (a, b) => {
    const dLa = rad(b[0] - a[0]), dLo = rad(b[1] - a[1]);
    const h = Math.sin(dLa / 2) ** 2 + Math.cos(rad(a[0])) * Math.cos(rad(b[0])) * Math.sin(dLo / 2) ** 2;
    return 12742 * Math.asin(Math.sqrt(h));
  };
  const bearing = (a, b) => {
    const f1 = rad(a[0]), f2 = rad(b[0]), dl = rad(b[1] - a[1]);
    return deg(Math.atan2(Math.sin(dl) * Math.cos(f2), Math.cos(f1) * Math.sin(f2) - Math.sin(f1) * Math.cos(f2) * Math.cos(dl)));
  };

  // 大圓航線取樣（球面 slerp），點數依距離調整
  function gcPoints(a, b) {
    const n = Math.max(8, Math.min(96, Math.round(distKm(a, b) / 40)));
    const v = p => [Math.cos(rad(p[0])) * Math.cos(rad(p[1])), Math.cos(rad(p[0])) * Math.sin(rad(p[1])), Math.sin(rad(p[0]))];
    const v1 = v(a), v2 = v(b);
    const w = Math.acos(Math.min(1, Math.max(-1, v1[0] * v2[0] + v1[1] * v2[1] + v1[2] * v2[2])));
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const t = i / n;
      const [A, B] = w < 1e-6 ? [1 - t, t] : [Math.sin((1 - t) * w) / Math.sin(w), Math.sin(t * w) / Math.sin(w)];
      const x = A * v1[0] + B * v2[0], y = A * v1[1] + B * v2[1], z = A * v1[2] + B * v2[2];
      pts.push([deg(Math.atan2(z, Math.hypot(x, y))), deg(Math.atan2(y, x))]);
    }
    return pts;
  }

  // 串接各段路線，經度展開（跨太平洋不會橫跳整張地圖）；回傳路徑點、各停點、每點所屬段索引
  function buildRoute(stops) {
    const pts = [], stopPts = [], legOf = [];
    for (let i = 0; i < stops.length - 1; i++) {
      for (const p of gcPoints(stops[i], stops[i + 1])) {
        if (pts.length) {
          const prev = pts[pts.length - 1];
          while (p[1] - prev[1] > 180) p[1] -= 360;
          while (p[1] - prev[1] < -180) p[1] += 360;
          if (Math.abs(p[0] - prev[0]) < 1e-9 && Math.abs(p[1] - prev[1]) < 1e-9) continue;
        }
        pts.push(p); legOf.push(i);
      }
      if (i === 0) stopPts.push(pts[0]);
      stopPts.push(pts[pts.length - 1]);
    }
    return { pts, stopPts, legOf };
  }

  // ── 行程軌跡：以城市為單位、含交通工具（✈️🚄🚗🚢，使用者口述規則）──
  const ALL_CAR = new Set(['2025-disneyland', '2026-sedona', '2026-east-cal', '2026-vegas-yosemite-sf']);
  const ROUTE_SPECIAL = {   // seq：B=基地、數字=cities 索引
    '2024-ireland':  { seq: ['B', 0, 1, 0, 'B'], modes: ['plane', 'train', 'train', 'plane'] },                 // 貝爾法斯特火車來回
    '2025-ny-boston': { seq: ['B', 0, 1, 0, 'B'], modes: ['plane', 'train', 'train', 'plane'] },                // 紐約⇄波士頓火車來回
    '2024-us-west':  { seq: ['B', 0, 1, 2, 3, 0, 4, 0, 'B'],                                                    // 開車段後回LA，再飛波特蘭支線
      modes: ['plane', 'car', 'car', 'car', 'car', 'plane', 'plane', 'plane'] },
    '2025-hokkaido': { seq: ['B', 0, 1, 2, 1, 3, 0, 'B'],                                                       // 東京進出，新幹線北上，小樽當日來回
      modes: ['plane', 'train', 'train', 'train', 'train', 'train', 'plane'] },
    '2026-disney-wonder': { seq: ['B', 0, 1, 2, 0, 'B'],                                                        // 開車到聖地牙哥，郵輪繞 Catalina/Ensenada 回港
      modes: ['car', 'ship', 'ship', 'ship', 'car'] },
    '2026-bay-area': { seq: ['B', 0, 1, 2, 'B'], modes: ['plane', 'car', 'car', 'plane'] },                       // 飛 LAX↔SFO，灣區內開車
    '2023-uk-nl-de': { seq: ['B', 0, 1, 2, 0, 3, 4, 5, 6, 7, 8, 9, 'B'],                                        // 回倫敦搭歐洲之星去阿姆斯特丹
      modes: ['train', 'train', 'train', 'train', 'train', 'train', 'train', 'train', 'train', 'train', 'train', 'plane'] }
  };
  const MODE_OVERRIDE = {   // 段索引→工具（預設：基地進出=plane、城市間=train）
    '2023-beijing-chengdu': { 1: 'plane' },
    '2023-be-lu-hu-at': { 2: 'plane' },   // 盧森堡→布達佩斯
    '2024-fi-no': { 2: 'plane' },         // 特羅姆瑟→卑爾根
    '2024-turkey': { 1: 'bus', 2: 'bus' },  // 伊斯坦堡→卡帕多奇亞→安塔利亞夜巴
    '2024-baltics': { 1: 'plane', 2: 'bus', 3: 'bus', 4: 'bus', 5: 'bus' },  // 斯德哥爾摩✈️塔林，三小國+華沙克拉科夫巴士
    '2024-greece': { 1: 'ship' }          // 雅典→聖托里尼渡輪
  };
  const MODE_EMOJI = { train: '🚄', car: '🚗', ship: '🚢', bus: '🚌' };

  function tripRoute(trip) {
    const home = homeFor(trip);
    const base = [home[2], home[3]];
    const cl = (trip.cities || []).map(c => [c.lat, c.lng]);
    const sp = ROUTE_SPECIAL[trip.id];
    const seq = (sp ? sp.seq : ['B', ...cl.keys(), 'B']).map(s => s === 'B' ? base : cl[s]);
    let modes;
    if (sp) modes = sp.modes.slice();
    else {
      modes = seq.slice(1).map((_, i) => (i === 0 || i === seq.length - 2) ? 'plane' : 'train');
      if (ALL_CAR.has(trip.id)) modes = modes.map(() => 'car');
      if (home[4] === 'GB' && trip.countries.every(c => c === 'GB')) modes = modes.map(() => 'train');  // 交換期間英國國內＝火車
      for (const [i, m] of Object.entries(MODE_OVERRIDE[trip.id] || {})) modes[i] = m;
    }
    return { home, seq, modes };
  }

  const PLANE_SVG = '<svg viewBox="0 0 24 24" fill="#4a6c8c"><path d="M21 16v-2l-8-5V3.5C13 2.67 12.33 2 11.5 2S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>';

  let flight = null;   // 進行中的飛行 { layers, toast, raf, timer, all }
  function clearFlight(instant) {
    if (!flight) return;
    const { layers, toast, raf, timer, all } = flight;
    flight = null;
    cancelAnimationFrame(raf); clearTimeout(timer);
    if (all) {
      document.getElementById('ms-flyall').textContent = '🛫 飛行回放';
      yearEl.hidden = true;
    }
    if (instant) { layers.forEach(l => map.removeLayer(l)); toast.remove(); return; }
    layers.forEach(l => l.getElement()?.classList.add('fly-fade'));
    toast.classList.add('fly-fade');
    setTimeout(() => { layers.forEach(l => map.removeLayer(l)); toast.remove(); }, 650);
  }

  // 鏡頭移動完（moveend）才繼續，避免航線動畫和鏡頭同時跑造成脫節
  const flyWait = (bounds, opts) => new Promise(res => {
    let done = false;
    const fin = () => { if (!done) { done = true; map.off('moveend', fin); res(); } };
    map.once('moveend', fin);
    setTimeout(fin, (opts.duration || 1) * 1000 + 600);
    map.flyToBounds(bounds, opts);
  });

  async function flyTrip(trip) {
    clearFlight(true);
    const { home, seq, modes } = tripRoute(trip);
    const { pts, stopPts, legOf } = buildRoute(seq);
    const cum = [0];
    for (let i = 1; i < pts.length; i++) cum.push(cum[i - 1] + distKm(pts[i - 1], pts[i]));
    const total = cum[pts.length - 1];
    const dur = Math.min(13000, Math.max(4500, total * 0.9));

    const ghost = L.polyline(pts, { color: '#8aa4bd', weight: 2, opacity: .55, dashArray: '2 7', interactive: false }).addTo(map);
    const trail = L.polyline([pts[0]], { color: '#4a6c8c', weight: 3, opacity: .9, interactive: false }).addTo(map);
    const dots = stopPts.map(p => L.marker(p, {
      icon: L.divIcon({ className: 'fly-dot', html: '<i></i>', iconSize: [11, 11], iconAnchor: [5.5, 5.5] }),
      interactive: false
    }).addTo(map));
    const m0 = modes[0] || 'plane';
    const plane = L.marker(pts[0], {
      icon: L.divIcon({
        className: 'plane-pin',
        html: `<span class="plane-i${m0 === 'plane' ? '' : ' ground'}">${m0 === 'plane' ? PLANE_SVG : MODE_EMOJI[m0]}</span>`,
        iconSize: [34, 34], iconAnchor: [17, 17]
      }),
      interactive: false, zIndexOffset: 1200
    }).addTo(map);
    const toast = document.createElement('div');
    toast.className = 'fly-toast';
    toast.textContent = `🧭 ${home[1]} 出發往返｜${trip.title}｜約 ${Math.round(total).toLocaleString()} km`;
    document.body.appendChild(toast);
    flight = { layers: [ghost, trail, ...dots, plane], toast, raf: 0, timer: 0 };
    const myFlight = flight;

    await flyWait(L.latLngBounds(pts), { padding: [70, 70], duration: 1.1, maxZoom: 6, easeLinearity: 0.25 });
    if (flight !== myFlight) return;
    await sleep(250);
    if (flight !== myFlight) return;

    const planeEl = plane.getElement()?.querySelector('.plane-i');
    const ease = x => x < .5 ? 2 * x * x : 1 - (-2 * x + 2) ** 2 / 2;   // easeInOutQuad：起步收尾慢、中段快
    const t0 = performance.now();
    let fi = 0, curMode = m0;
    (function frame(now) {
      if (flight !== myFlight) return;
      const p = Math.min(1, (now - t0) / dur);
      const d = total * ease(p);
      while (fi < pts.length - 2 && cum[fi + 1] < d) fi++;
      const segLen = cum[fi + 1] - cum[fi] || 1e-9;
      const k = Math.min(1, (d - cum[fi]) / segLen);
      const cur = [pts[fi][0] + (pts[fi + 1][0] - pts[fi][0]) * k, pts[fi][1] + (pts[fi + 1][1] - pts[fi][1]) * k];
      plane.setLatLng(cur);
      if (planeEl) {
        const mode = modes[legOf[Math.min(fi + 1, legOf.length - 1)]] || 'plane';
        if (mode !== curMode) {
          curMode = mode;
          planeEl.innerHTML = mode === 'plane' ? PLANE_SVG : MODE_EMOJI[mode];
          planeEl.classList.toggle('ground', mode !== 'plane');
        }
        // 陸面 emoji 朝左，向東行進時翻面
        planeEl.style.transform = mode === 'plane'
          ? `rotate(${bearing(pts[fi], pts[fi + 1])}deg)`
          : (pts[fi + 1][1] > pts[fi][1] ? 'scaleX(-1)' : 'none');
      }
      trail.setLatLngs(pts.slice(0, fi + 1).concat([cur]));
      if (p < 1) myFlight.raf = requestAnimationFrame(frame);
      else myFlight.timer = setTimeout(() => clearFlight(), 2800);   // 降落後軌跡停留一下再淡出
    })(t0);
  }

  const tripById = Object.fromEntries(trips.map(t => [t.id, t]));
  document.addEventListener('click', e => {
    const el = e.target.closest('[data-fly]');
    if (!el) return;
    e.preventDefault();
    map.closePopup();
    flyTrip(tripById[el.dataset.fly]);
  });

  // ── 🛫 飛行回放：從 2022 年底至今所有航班照日期連續飛 ──
  // 純開車/郵輪的旅程不畫（美國只有芝加哥、奧蘭多/紐約/波士頓、夏威夷、2024美西的跨洋段有飛）
  const NO_FLY = new Set(['2025-disneyland', '2026-disney-wonder', '2026-sedona', '2026-east-cal', '2026-vegas-yosemite-sf']);
  const ALL_CITY_FLY = new Set(['2023-beijing-chengdu']);   // 站站都有飛（北京→成都國內線）
  const FLY_SEQ = {                       // 指定飛行停點（城市索引）：只畫真的搭飛機的段
    '2024-us-west': [0, 4, 0]             // LA + 波特蘭支線來回
  };
  const NO_RETURN = new Set(['2025-orlando']);   // 奧蘭多結束直接飛紐約（下一趟從 MCO 接續，不畫回 LA）
  const tripStops = t => {
    if (NO_FLY.has(t.id)) return [];
    if (FLY_SEQ[t.id]) return FLY_SEQ[t.id].map(i => ({ ll: [t.cities[i].lat, t.cities[i].lng], cc: 'US' }));
    if (ALL_CITY_FLY.has(t.id)) return t.cities.map(c => ({ ll: [c.lat, c.lng], cc: c.cc || t.countries[0] }));
    const seen = new Set(), stops = [];   // 其他以國家為單位：每國取第一個城市當停點
    for (const c of (t.cities || [])) {
      const cc = c.cc || t.countries[0];
      if (!seen.has(cc)) { seen.add(cc); stops.push({ ll: [c.lat, c.lng], cc }); }
    }
    return stops;
  };

  function buildFlightLog() {
    const legs = [];
    let cur = null, curBase = null;
    const sorted = [...trips].sort((a, b) => a.dateStart < b.dateStart ? -1 : 1);
    for (const t of sorted) {
      const home = homeFor(t);
      const base = [home[2], home[3]];
      if (!curBase) { cur = base; curBase = home; }
      else if (home[1] !== curBase[1]) {   // 搬家（換基地）
        legs.push({ from: cur, to: base, label: home[5] || `✈️ 移動到${home[1]}`, year: +t.dateStart.slice(0, 4), move: true, key: 'move' + legs.length });
        cur = base; curBase = home;
      }
      // 交換期間英國國內小旅行是搭火車，不畫
      const stops = tripStops(t).filter(s => !(home[4] === 'GB' && s.cc === 'GB'));
      if (!stops.length) continue;
      const lbl = `${t.dateStart.slice(0, 7).replace('-', '/')}｜${t.title}`;
      const y = +t.dateStart.slice(0, 4);
      for (const s of stops) {
        if (distKm(cur, s.ll) > 15) legs.push({ from: cur, to: s.ll, label: lbl, year: y, key: t.id });
        cur = s.ll;
      }
      if (NO_RETURN.has(t.id)) continue;   // 停在最後停點，下一趟由此接續起飛
      if (distKm(cur, base) > 15) legs.push({ from: cur, to: base, label: lbl, year: y, ret: true, key: t.id });
      cur = base;
    }
    return legs;
  }

  const flyAllBtn = document.getElementById('ms-flyall');
  flyAllBtn.onclick = async () => {
    if (flight && flight.all) { clearFlight(); return; }   // 再按一次＝停止
    clearFlight(true);
    const legs = buildFlightLog();

    // 每段航線先取好大圓路徑點，經度接續展開（跨太平洋往返不會橫跳）
    let prevLng = null;
    for (const leg of legs) {
      const pts = gcPoints(leg.from, leg.to);
      if (prevLng !== null) {
        while (pts[0][1] - prevLng > 180) for (const p of pts) p[1] -= 360;
        while (pts[0][1] - prevLng < -180) for (const p of pts) p[1] += 360;
      }
      for (let i = 1; i < pts.length; i++) {
        while (pts[i][1] - pts[i - 1][1] > 180) pts[i][1] -= 360;
        while (pts[i][1] - pts[i - 1][1] < -180) pts[i][1] += 360;
      }
      leg.pts = pts;
      leg.km = distKm(leg.from, leg.to);
      prevLng = pts[pts.length - 1][1];
    }
    const totalKm = legs.reduce((s, l) => s + l.km, 0);

    flyAllBtn.textContent = '⏹ 停止回放';
    const toast = document.createElement('div');
    toast.className = 'fly-toast';
    document.body.appendChild(toast);
    const plane = L.marker(legs[0].pts[0], {
      icon: L.divIcon({ className: 'plane-pin', html: `<span class="plane-i">${PLANE_SVG}</span>`, iconSize: [34, 34], iconAnchor: [17, 17] }),
      interactive: false, zIndexOffset: 1200
    }).addTo(map);
    flight = { layers: [plane], toast, raf: 0, timer: 0, all: true };
    const myFlight = flight;
    const planeEl = plane.getElement()?.querySelector('.plane-i');

    // 單段飛行；回程段飛快一點、鏡頭不重新對焦
    const spanOf = b => Math.max(b.getNorth() - b.getSouth(), b.getEast() - b.getWest());
    const animLeg = leg => new Promise(resolve => {
      const pts = leg.pts;
      const cum = [0];
      for (let i = 1; i < pts.length; i++) cum.push(cum[i - 1] + distKm(pts[i - 1], pts[i]));
      const total = cum[pts.length - 1];
      const dur = Math.min(2200, Math.max(700, total * 0.32)) * (leg.ret ? 0.7 : 1);
      const trail = L.polyline([pts[0]], { color: '#4a6c8c', weight: 3, opacity: .9, interactive: false }).addTo(map);
      myFlight.layers.push(trail);
      const t0 = performance.now();
      let fi = 0;
      (function frame(now) {
        if (flight !== myFlight) return resolve(false);
        const p = Math.min(1, (now - t0) / dur);
        const d = total * p;
        while (fi < pts.length - 2 && cum[fi + 1] < d) fi++;
        const k = Math.min(1, (d - cum[fi]) / ((cum[fi + 1] - cum[fi]) || 1e-9));
        const cur = [pts[fi][0] + (pts[fi + 1][0] - pts[fi][0]) * k, pts[fi][1] + (pts[fi + 1][1] - pts[fi][1]) * k];
        plane.setLatLng(cur);
        if (planeEl) planeEl.style.transform = `rotate(${bearing(pts[fi], pts[fi + 1])}deg)`;
        trail.setLatLngs(pts.slice(0, fi + 1).concat([cur]));
        if (p < 1) { myFlight.raf = requestAnimationFrame(frame); return; }
        trail.setStyle({ weight: 2, opacity: .5 });   // 飛完的航線留下淡淡一條
        if (!leg.ret && !leg.move) {
          const dot = L.marker(pts[pts.length - 1], {
            icon: L.divIcon({ className: 'fly-dot', html: '<i></i>', iconSize: [11, 11], iconAnchor: [5.5, 5.5] }),
            interactive: false
          }).addTo(map);
          myFlight.layers.push(dot);
        }
        resolve(true);
      })(t0);
    });

    let lastYear = 0, lastKey = null;
    for (const leg of legs) {
      if (flight !== myFlight) return;
      toast.textContent = `✈️ ${leg.label}`;
      if (leg.year !== lastYear) {
        lastYear = leg.year;
        yearEl.textContent = leg.year;
        yearEl.hidden = false;
        yearEl.classList.remove('ry-in'); void yearEl.offsetWidth;
        yearEl.classList.add('ry-in');
      }
      // 鏡頭：一趟旅程只對焦一次（含去回所有航段），且已在視野內就不動——減少暈眩感
      if (leg.key !== lastKey) {
        lastKey = leg.key;
        const b = L.latLngBounds(legs.filter(l => l.key === leg.key).flatMap(l => l.pts));
        const v = map.getBounds();
        if (!v.contains(b) || spanOf(b) < spanOf(v) * 0.07) {
          await flyWait(b, { padding: [90, 90], maxZoom: 5, duration: 1.1, easeLinearity: 0.25 });
          if (flight !== myFlight) return;
        }
      }
      if (!await animLeg(leg)) return;
      await sleep(leg.ret ? 80 : 220);   // 降落小停頓，節奏不趕
      if (flight !== myFlight) return;
    }

    // 抵達現在：拉遠看整張航線網，停一下再淡出
    yearEl.hidden = true;
    toast.textContent = `🌍 ${legs.length} 段航程｜共約 ${Math.round(totalKm).toLocaleString()} km`;
    const allPts = legs.flatMap(l => l.pts);
    map.flyToBounds(L.latLngBounds(allPts), { padding: [60, 60], duration: 1.6, easeLinearity: 0.25 });
    myFlight.timer = setTimeout(() => clearFlight(), 8000);
  };
})();
</script>
</body>
</html>
