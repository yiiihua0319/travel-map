<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私人基地｜Eva's Travel Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔓</text></svg>">
<link rel="stylesheet" href="css/style.css?v=20260705n">
<style>
  /* 私人基地限定風格（跟可愛說明書同款：暖白＋淡藍＋杏色螢光筆） */
  .base-hero {
    text-align: center;
    background: #fdfcfa;
    border: 1.5px solid #e3e0da;
    border-radius: 24px;
    padding: 34px 24px 28px;
    margin-bottom: 26px;
    box-shadow: 0 2px 14px rgba(74,108,140,.08);
  }
  .base-hero .stk {
    width: 62px; height: 62px;
    margin: 0 auto 12px;
    display: grid; place-items: center;
    background: #eef3f8;
    border-radius: 18px;
    font-size: 32px;
    transform: rotate(-4deg);
  }
  .base-hero h1 { font-size: 23px; font-weight: 800; letter-spacing: .02em; }
  .base-hero h1 em {
    font-style: normal;
    background: linear-gradient(transparent 62%, #f2c17d 62%, #f2c17d 92%, transparent 92%);
    padding: 0 2px;
  }
  .base-hero .hi { margin-top: 8px; color: #6b7684; font-size: 14px; }
  .base-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
  .base-menu a {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: #eef3f8;
    border: 1.5px dashed #b9c9d9;
    border-radius: 15px;
    padding: 14px 10px;
    color: #2b3440; font-size: 13.5px; font-weight: 700;
  }
  .base-menu a:hover { border-color: #4a6c8c; opacity: 1; }
  .base-menu a span { font-size: 24px; }
  .base-menu a small { font-weight: 400; color: #6b7684; font-size: 11.5px; }
  /* 打卡進度 */
  .vp-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 4px; border-radius: 10px;
    color: var(--text); font-size: 14px;
  }
  .vp-row:hover { background: var(--bg-soft); opacity: 1; }
  .vp-flag { flex: none; font-size: 18px; }
  .vp-name { flex: 0 0 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vp-track { flex: 1; height: 11px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; }
  .vp-fill { display: block; height: 100%; background: #7ca982; border-radius: 999px; }
  .vp-n { flex: none; width: 64px; text-align: right; font-size: 12.5px; color: var(--text-soft); font-variant-numeric: tabular-nums; }
  .vp-empty { font-size: 13.5px; color: var(--text-soft); background: var(--bg-soft); border-radius: 12px; padding: 14px 18px; }
  @media (max-width: 480px) { .vp-name { flex-basis: 84px; font-size: 13px; } }
</style>
</head>
<body>
<div id="header"></div>
<main>
  <div class="container">
    <div class="base-hero">
      <div class="stk">🔓</div>
      <h1>歡迎回來，<em>Eva 的私人基地</em></h1>
      <p class="hi" id="greet">這裡只有你看得到 🤫</p>
      <div class="base-menu">
        <a href="#checkin"><span>✅</span>打卡進度<small>吃過踩過的口袋名單</small></a>
        <a href="#stats"><span>📊</span>旅遊統計<small>花費・天數・時間軸</small></a>
        <a href="index.html"><span>🗺️</span>回地圖<small>公開版首頁</small></a>
      </div>
    </div>
    <div id="checkin-sec"></div>
    <div id="stats-anchor"></div>
    <div id="content">載入中…</div>
  </div>
</main>

<script src="js/common.js"></script>
<script>
// 這頁是私人模式的鑰匙：開過一次，這個瀏覽器就解鎖（統計連結＋口袋名單打卡勾勾）
localStorage.setItem('tm_priv', '1');
document.getElementById('header').outerHTML = headerHTML('stats');

// 依時間打招呼
{
  const h = new Date().getHours();
  const g = h < 5 ? '夜貓子還不睡 🌙' : h < 11 ? '早安 ☀️' : h < 18 ? '午安 🌤️' : '晚安 🌙';
  document.getElementById('greet').textContent = g + '　這裡只有你看得到 🤫';
}

(async () => {
  const [tripsData, countries, placesData] = await Promise.all([
    loadJSON('data/trips.json'), loadJSON('data/countries.json'),
    loadJSON('data/places.json').catch(() => ({}))
  ]);
  const trips = tripsData.trips;
  const el = document.getElementById('content');

  // ── ✅ 打卡進度（各國口袋名單 去過/總數）──
  {
    const visited = getVisited();
    const rows = [];
    let gTot = 0, gDone = 0;
    for (const cc in placesData) {
      let tot = 0, done = 0;
      for (const g of placesData[cc]) for (const p of g.places) { tot++; if (visited.has(p.url)) done++; }
      gTot += tot; gDone += done;
      if (tot) rows.push({ cc, tot, done });
    }
    rows.sort((a, b) => b.done - a.done || b.tot - a.tot);
    const sec = document.getElementById('checkin-sec');
    let h = `<h2 class="sec-title" id="checkin">✅ 打卡進度 <span class="pl-count">全部 ${gDone}／${gTot} 個地點</span></h2>`;
    if (!gDone) {
      h += `<div class="vp-empty">還沒開始打卡～去任何國家頁的「📍 我的口袋名單」，點地點前面的 ⬜ 就能記錄吃過踩過的地方！</div>`;
    } else {
      const shown = rows.filter(r => r.done);
      h += shown.map(r => `<a class="vp-row" href="country.html?c=${r.cc}">
        <span class="vp-flag">${flagEmoji(r.cc)}</span>
        <span class="vp-name">${countries[r.cc]?.name || r.cc}</span>
        <span class="vp-track"><span class="vp-fill" style="width:${(r.done / r.tot * 100).toFixed(1)}%"></span></span>
        <span class="vp-n">${r.done}／${r.tot}</span>
      </a>`).join('');
      const rest = rows.length - shown.length;
      if (rest > 0) h += `<p class="stat-note">還有 ${rest} 個國家沒開張，加油打卡 💪</p>`;
    }
    h += `<div class="priv-note" style="margin-top:20px">🔓 私人模式已在此瀏覽器啟用（每台裝置各開一次這頁）
      <button id="priv-off">關閉私人模式</button></div>`;
    sec.innerHTML = h;
    document.getElementById('priv-off').onclick = () => {
      localStorage.removeItem('tm_priv');
      alert('已關閉私人模式（打卡紀錄仍保留，再開這頁即可恢復）');
      location.href = 'index.html';
    };
  }

  const days = t => Math.round((new Date(t.dateEnd) - new Date(t.dateStart)) / 86400000) + 1;
  const total = t => t.expenses ? Object.values(t.expenses.items).reduce((a, b) => a + b, 0) : null;
  const nt = v => 'NT$' + Math.round(v).toLocaleString();

  // ── 總覽 ──
  const nC = new Set(trips.flatMap(t => t.countries)).size;
  const totalDays = trips.reduce((s, t) => s + days(t), 0);
  const withE = trips.filter(t => t.expenses);
  const grand = withE.reduce((s, t) => s + total(t), 0);

  let html = `<h2 class="sec-title" id="stats">📊 旅遊統計 <span class="pl-count">數字裡的旅行足跡</span></h2>
  <div class="stat-grid">
    <div class="stat-card"><span class="stat-n">${nC}</span><span class="stat-l">🌍 個國家</span></div>
    <div class="stat-card"><span class="stat-n">${trips.length}</span><span class="stat-l">✈️ 趟旅程</span></div>
    <div class="stat-card"><span class="stat-n">${totalDays}</span><span class="stat-l">📅 天在路上</span></div>
    <div class="stat-card"><span class="stat-n">${Math.round(grand / 10000)}<small>萬</small></span><span class="stat-l">💰 記錄到的花費</span></div>
  </div>`;

  // ── 最貴/最省 ──
  const ranked = [...withE].sort((a, b) => total(b) - total(a));
  const hi = ranked[0], lo = ranked[ranked.length - 1];
  const tripLink = t => `country.html?c=${t.countries[0]}&t=${t.id}`;
  html += `<h2 class="sec-title">🏆 最貴 vs 最省</h2>
  <div class="hilo">
    <a class="hilo-card" href="${tripLink(hi)}">
      <span class="hilo-tag">💸 最貴的一趟</span>
      <b>${hi.title}</b>
      <span class="hilo-amt">${nt(total(hi))}</span>
      <span class="hilo-days">${fmtRange(hi)} · ${days(hi)} 天</span>
    </a>
    <a class="hilo-card" href="${tripLink(lo)}">
      <span class="hilo-tag">🪙 最省的一趟</span>
      <b>${lo.title}</b>
      <span class="hilo-amt">${nt(total(lo))}</span>
      <span class="hilo-days">${fmtRange(lo)} · ${days(lo)} 天</span>
    </a>
  </div>`;

  // ── 花費排行 Top 10 ──
  const top = ranked.slice(0, 10);
  const maxT = total(top[0]);
  html += `<h2 class="sec-title">💰 花費排行 Top 10</h2><div class="hbars">` +
    top.map((t, i) => `<a class="hbar" href="${tripLink(t)}">
      <span class="hbar-rank">${i + 1}</span>
      <span class="hbar-label">${flagEmoji(t.countries[0])} ${t.title}</span>
      <span class="hbar-track"><span class="hbar-fill" style="width:${(total(t) / maxT * 100).toFixed(1)}%"></span></span>
      <span class="hbar-val">${Math.round(total(t) / 1000)}K</span>
    </a>`).join('') + `</div>
    <p class="stat-note">僅計有記帳的 ${withE.length} 趟；部分旅程只記錄部分幣別</p>`;

  // ── 每年旅行天數 ──
  const byY = {};
  for (const t of trips) { const y = t.dateStart.slice(0, 4); byY[y] = byY[y] || { d: 0, n: 0 }; byY[y].d += days(t); byY[y].n++; }
  const years = Object.keys(byY).sort();
  const maxD = Math.max(...years.map(y => byY[y].d));
  html += `<h2 class="sec-title">📅 每年旅行天數</h2><div class="ybars">` +
    years.map(y => `<div class="ybar">
      <span class="ybar-val">${byY[y].d}天</span>
      <span class="ybar-track"><span class="ybar-fill" style="height:${(byY[y].d / maxD * 100).toFixed(1)}%"></span></span>
      <span class="ybar-year">${y}</span>
      <span class="ybar-trips">${byY[y].n} 趟</span>
    </div>`).join('') + '</div>';

  // ── 錢都花去哪（類別總覽圓餅圖）──
  const cat = {};
  for (const t of withE) for (const [k, v] of Object.entries(t.expenses.items)) cat[k] = (cat[k] || 0) + v;
  const sorted = Object.entries(cat).sort((a, b) => b[1] - a[1]);
  const items = {};
  sorted.slice(0, 7).forEach(([k, v]) => items[k] = (items[k] || 0) + Math.round(v));
  const rest = sorted.slice(7).reduce((s, [, v]) => s + v, 0);
  if (rest) items['其他'] = (items['其他'] || 0) + Math.round(rest);
  html += '<h2 class="sec-title">🧾 錢都花去哪</h2>' +
    pieChartHTML({ currency: 'TWD', items, note: '全部有記帳旅程加總（已換算台幣）' });

  // ── 造訪國家時間軸（首次踩點）──
  const first = {};
  for (const t of [...trips].sort((a, b) => a.dateStart.localeCompare(b.dateStart)))
    for (const cc of t.countries) if (!first[cc]) first[cc] = t.dateStart.slice(0, 4);
  const byYear = {};
  for (const [cc, y] of Object.entries(first)) (byYear[y] = byYear[y] || []).push(cc);
  html += '<h2 class="sec-title">🗓️ 解鎖國家時間軸</h2><div class="tl">' +
    Object.keys(byYear).sort().map(y => `<div class="tl-row">
      <span class="tl-year">${y}</span>
      <span class="tl-n">+${byYear[y].length} 國</span>
      <span class="tl-flags">${byYear[y].map(cc =>
        `<a href="country.html?c=${cc}" title="${countries[cc]?.name || cc}">${flagEmoji(cc)}</a>`).join(' ')}</span>
    </div>`).join('') + '</div>';

  el.innerHTML = html;
})();
</script>
</body>
</html>
