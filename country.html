<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國家遊記｜Eva's Travel Map</title>
<meta name="description" content="各國旅程紀錄：行程、花費圓餅圖、口袋名單、遊記">
<meta property="og:title" content="國家遊記｜Eva's Travel Map">
<meta property="og:description" content="各國旅程紀錄：行程、花費圓餅圖、口袋名單、遊記">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yiiihua0319.github.io/travel-map/country.html">
<meta property="og:image" content="https://yiiihua0319.github.io/travel-map/assets/og-share.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css?v=20260709b">
</head>
<body>
<div id="header"></div>
<main>
  <div class="container">
    <a class="back-link" href="list.html">← 回旅程列表</a>
    <div id="content">載入中…</div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/common.js"></script>
<script>
document.getElementById('header').outerHTML = headerHTML('');

(async () => {
  const qs = new URLSearchParams(location.search);
  const code = (qs.get('c') || '').toUpperCase();
  const wantTrip = qs.get('t'); // 從地圖/列表點特定旅程進來時，直接停在那趟的分頁
  const [tripsData, countries, placesData] = await Promise.all([
    loadJSON('data/trips.json'), loadJSON('data/countries.json'),
    loadJSON('data/places.json').catch(() => ({}))
  ]);
  const info = countries[code];
  const el = document.getElementById('content');
  if (!info) { el.innerHTML = '<div class="empty-note">找不到這個國家 🥲</div>'; return; }

  document.title = info.name + '｜Eva\'s Travel Map';
  const myTrips = tripsData.trips
    .filter(t => t.countries.includes(code))
    .sort((a, b) => a.dateStart.localeCompare(b.dateStart));

  // 遊記（心得）依旅程分組
  const contentList = (info.content || []).map(c => typeof c === 'string' ? { file: c } : c);
  const byTrip = {};
  const orphan = [];
  for (const c of contentList) (c.trip ? (byTrip[c.trip] = byTrip[c.trip] || []).push(c.file) : orphan.push(c.file));

  el.innerHTML = `
    <div class="country-head">
      <span class="country-flag">${flagEmoji(code)}</span>
      <div><div class="page-title">${info.name}</div>
      <div class="page-sub" style="margin:0">${myTrips.length} 趟旅程</div></div>
    </div>
    ${info.ig?.length ? `<div class="ig-row"><span class="ig-label">📸 IG 限時動態精選：</span>${info.ig.map(h =>
      `<a class="ig-chip" href="https://www.instagram.com/stories/highlights/${h.id}/" target="_blank" rel="noopener">${h.name}</a>`).join('')}</div>` : ''}
    <div id="trip-tabs"></div>
    <div id="trip-panes"></div>
    <div id="map-photo"></div>
    <div id="places"></div>
    <div id="orphan-articles"></div>`;

  // ── 分頁籤（多趟旅程以城市/旅程為單位）──
  const tabLabel = t => {
    let s = t.title.startsWith(info.name) ? t.title.slice(info.name.length) : t.title;
    if (!s) s = t.title;
    return s + '（' + t.dateStart.slice(2, 7).replace('-', '/') + '）';
  };
  const tabsEl = document.getElementById('trip-tabs');
  const panesEl = document.getElementById('trip-panes');
  const initIdx = Math.max(0, myTrips.findIndex(t => t.id === wantTrip)); // 預設分頁：網址指定的那趟，否則第一趟
  let curTabIdx = myTrips.length > 1 ? String(initIdx) : null;  // 目前選中的城市分頁（null=單趟，不篩選）
  let curCat = 'all';                                 // 目前選中的分類
  let applyPlFilter = () => {};                        // 由口袋名單區塊指派
  if (myTrips.length > 1) {
    tabsEl.innerHTML = '<div class="tab-bar">' + myTrips.map((t, i) =>
      `<button class="tab-chip${i === initIdx ? ' active' : ''}" data-i="${i}">${tabLabel(t)}</button>`).join('') + '</div>';
  }

  // 亞洲行程在公開網站不顯示費用（圓餅圖＋行程內記帳段落）；私人模式照常
  const ASIA = new Set(['JP', 'KR', 'CN', 'HK']);
  const hideMoney = ASIA.has(code) && !isPriv();
  // 標題去掉重複的國名前綴（頁面上方已有國名）：日本關西 → 關西
  const dispTitle = t => (t.title.startsWith(info.name) && t.title.length > info.name.length)
    ? t.title.slice(info.name.length) : t.title;

  // ── 每趟旅程：行程 → 費用 → 心得 ──
  for (let i = 0; i < myTrips.length; i++) {
    const t = myTrips[i];
    const pane = document.createElement('section');
    pane.className = 'trip-block trip-pane';
    pane.dataset.i = i;
    if (myTrips.length > 1 && i !== initIdx) pane.style.display = 'none';

    let inner = `<div class="trip-head">
      <h2 class="trip-name">${dispTitle(t)}</h2>
      <span class="trip-dates">${fmtRange(t)}</span>
      <button class="poster-btn" data-i="${i}" title="產生這趟的分享海報">🖼️ 海報</button>
    </div>`;

    // 一行路線摘要：城市依造訪順序串起來 + 天數
    const routeCities = (t.cities || []).map(c => c.name).filter((n, j, a) => n && a.indexOf(n) === j);
    const tdays = Math.round((new Date(t.dateEnd) - new Date(t.dateStart)) / 86400000) + 1;
    const routeParts = [];
    if (routeCities.length > 1) routeParts.push(routeCities.join(' → '));
    else if (routeCities.length === 1) routeParts.push(routeCities[0]);
    routeParts.push(tdays + ' 天');
    inner += `<div class="trip-route">🧭 ${routeParts.join('｜')}</div>`;

    // 1. 行程（公開的亞洲頁面把「## 花費」整段拿掉）
    let md = await loadText('data/trips/' + t.id + '.md');
    if (md && hideMoney) md = md.replace(/\n## [^\n]*花費[^\n]*\n[\s\S]*?(?=\n## |$)/g, '');
    if (md) inner += '<h3 class="part-title">🗓️ 行程</h3><div class="trip-md">' + renderTripMD(md) + '</div>';

    // 2. 費用
    if (t.expenses && !hideMoney) inner += '<h3 class="part-title">💰 費用</h3>' + pieChartHTML(t.expenses);

    // 3. 心得（遊記）
    if (byTrip[t.id]?.length) {
      inner += '<h3 class="part-title">✍️ 心得</h3>';
      for (const f of [...new Set(byTrip[t.id])]) {
        const amd = await loadText(f);
        if (amd) inner += '<div class="md-section"><div class="md-body">' + renderMD(amd) + '</div></div>';
      }
    }
    if (!md && !t.expenses && !byTrip[t.id]?.length) {
      inner += '<div class="empty-note">這趟的紀錄整理中 ✈️</div>';
    }
    pane.innerHTML = inner;
    panesEl.appendChild(pane);
  }

  // 分頁切換
  tabsEl.querySelectorAll('.tab-chip').forEach(btn => btn.onclick = () => {
    tabsEl.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    panesEl.querySelectorAll('.trip-pane').forEach(p =>
      p.style.display = p.dataset.i === btn.dataset.i ? '' : 'none');
    curTabIdx = btn.dataset.i;
    applyPlFilter();   // 口袋名單同步只顯示這個城市
  });

  // ── 造訪地點小地圖 + 照片 ──
  const mp = document.getElementById('map-photo');
  const pins = [];
  // 多國旅程只取屬於這個國家的城市（沒標 cc 的舊資料照舊顯示）
  for (const t of myTrips) for (const c of (t.cities || [])) if (!c.cc || c.cc === code) pins.push(c);
  let mpHTML = '';
  if (pins.length) mpHTML += '<h2 class="sec-title">🗺️ 造訪地點</h2><div id="country-map"></div>';
  if (info.images?.length) {
    mpHTML += '<h2 class="sec-title">📷 照片</h2><div class="img-grid">' +
      info.images.map(u => `<img src="${u}" loading="lazy" alt="${info.name}">`).join('') + '</div>';
  }
  mp.innerHTML = mpHTML;

  if (pins.length) {
    const cmap = L.map('country-map', { scrollWheelZoom: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 14
    }).addTo(cmap);
    const group = [], seen = new Set();
    let pj = 0;
    for (const p of pins) {
      const key = p.lat + ',' + p.lng;
      if (seen.has(key)) continue; seen.add(key);
      const icon = L.divIcon({
        className: 'cpin',
        html: `<span class="cpin-i" style="animation-delay:${pj++ * 60}ms">📍</span>`,
        iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -13]
      });
      group.push(L.marker([p.lat, p.lng], { icon }).addTo(cmap).bindPopup('📍 ' + p.name));
    }
    if (group.length === 1) cmap.setView(group[0].getLatLng(), 6);
    else cmap.fitBounds(L.featureGroup(group).getBounds().pad(0.4));
  }

  // ── 口袋名單（Google Maps 已儲存地點）──
  const pv = document.getElementById('places');
  const groups = placesData[code] || [];
  if (groups.length) {
    const CATMETA = { food: ['🍜', '美食'], sight: ['🏞️', '景點'], shop: ['🛍️', '購物'], stay: ['🏨', '住宿'], other: ['📍', '其他'] };
    const catOf = c => CATMETA[c] || CATMETA.other;

    // 每個清單對應到哪幾趟旅程（比對旅程標題是否含城市名，或別名對照）
    const LIST_ALIAS = {
      '京都': ['關西'], '神戶': ['關西'], '大阪': ['關西'],
      '蘇格蘭': ['愛丁堡'],
      'AZ': ['亞利桑那'], 'Chicago': ['芝加哥'],
      'NYC ORD BOS': ['紐約', '波士頓', '芝加哥'],
    };
    const matchTrip = (listName, t) =>
      t.title.includes(listName) || (LIST_ALIAS[listName] || []).some(k => t.title.includes(k));

    // 分類統計（全國）
    const catCount = {};
    for (const g of groups) for (const p of g.places) catCount[p.cat] = (catCount[p.cat] || 0) + 1;
    const totalP = groups.reduce((s, g) => s + g.places.length, 0);

    let ph = `<h2 class="sec-title">📍 我的口袋名單 <span class="pl-count" id="pl-count">${totalP} 個地點</span></h2>`;
    // 分類分頁（美食 / 景點 / 購物…當作 tab），數量會依所選城市即時更新
    ph += '<div class="pl-cat-bar"><button class="pl-cat active" data-cat="all">全部 <span class="pl-catn"></span></button>';
    for (const k of ['food', 'sight', 'shop', 'stay', 'other'])
      if (catCount[k]) ph += `<button class="pl-cat" data-cat="${k}">${catOf(k)[0]} ${catOf(k)[1]} <span class="pl-catn"></span></button>`;
    ph += '</div><div class="pl-flat">';

    // 每個城市清單直接攤平顯示（不需展開）；城市小標只在同時出現多個城市時才有意義
    for (const g of groups) {
      const idxs = myTrips.map((t, i) => matchTrip(g.list, t) ? i : -1).filter(i => i >= 0);
      const attr = idxs.length ? ` data-trips="${idxs.join(',')}"` : ' data-all';
      ph += `<div class="pl-city"${attr}>
        <div class="pl-city-h">${g.list}<span class="pl-n">${g.places.length}</span></div>
        <ul class="pl-list">` +
        g.places.map(p => `<li data-cat="${p.cat || 'other'}"${p.ll ? ` data-ll="${p.ll[0]},${p.ll[1]}"` : ''}>${isPriv() ? `<button class="pl-chk" data-k="${p.url}" title="去過了打勾">⬜</button>` : ''}<span class="pl-emoji">${catOf(p.cat)[0]}</span><a href="${p.url}" target="_blank" rel="noopener">${p.name}</a>${p.note ? `<span class="pl-note">${p.note}</span>` : ''}</li>`).join('') +
        '</ul></div>';
    }
    ph += '</div>';
    pv.innerHTML = ph;

    // 兩點距離（km，haversine 簡化版）
    const distKm = (a, b) => {
      const R = 6371, d2r = Math.PI / 180;
      const dLat = (b[0] - a[0]) * d2r, dLng = (b[1] - a[1]) * d2r;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(a[0] * d2r) * Math.cos(b[0] * d2r) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    };
    const NEAR_KM = 150; // 地點距離該趟任一城市 150km 內才算「這趟的」

    // 篩選：城市（上方旅程分頁）＋地理距離＋分類。分類數量隨城市即時重算
    applyPlFilter = () => {
      const cities = [...pv.querySelectorAll('.pl-city')];
      // 選中旅程的城市座標（單趟國家不做距離過濾）
      const tripCities = curTabIdx === null ? null :
        (myTrips[+curTabIdx].cities || []).filter(c => c.lat != null).map(c => [c.lat, c.lng]);
      const nearOK = li => {
        if (!tripCities || !tripCities.length || !li.dataset.ll) return true; // 沒座標的地點放行
        const ll = li.dataset.ll.split(',').map(Number);
        return tripCities.some(c => distKm(c, ll) <= NEAR_KM);
      };
      const cityOKmap = new Map();
      const catN = { all: 0, food: 0, sight: 0, shop: 0, stay: 0, other: 0 };
      for (const ci of cities) {
        // 選了城市分頁時只顯示對應清單；沒對到任何旅程的清單（data-all）也一併隱藏
        const cityOK = curTabIdx === null ||
          (ci.dataset.trips || '').split(',').includes(curTabIdx);
        cityOKmap.set(ci, cityOK);
        if (cityOK) ci.querySelectorAll('li').forEach(li => {
          if (!nearOK(li)) return;
          catN.all++; catN[li.dataset.cat] = (catN[li.dataset.cat] || 0) + 1;
        });
      }
      // 若目前分類在這個城市沒有資料，退回「全部」
      if (curCat !== 'all' && !catN[curCat]) curCat = 'all';
      for (const ci of cities) {
        const cityOK = cityOKmap.get(ci);
        let vc = 0;
        ci.querySelectorAll('li').forEach(li => {
          const vis = cityOK && nearOK(li) && (curCat === 'all' || li.dataset.cat === curCat);
          li.style.display = vis ? '' : 'none';
          if (vis) vc++;
        });
        ci.style.display = (cityOK && vc) ? '' : 'none';
        ci.querySelector('.pl-n').textContent = vc;
      }
      pv.querySelectorAll('.pl-cat').forEach(b => {
        const k = b.dataset.cat, n = k === 'all' ? catN.all : (catN[k] || 0);
        b.querySelector('.pl-catn').textContent = n;
        b.style.display = (k === 'all' || n) ? '' : 'none';
        b.classList.toggle('active', k === curCat);
      });
      document.getElementById('pl-count').textContent = (curCat === 'all' ? catN.all : catN[curCat]) + ' 個地點';
      // 這趟城市完全沒有口袋名單就整段隱藏（例如 Sequoia、郵輪）
      pv.style.display = catN.all ? '' : 'none';
    };
    pv.querySelectorAll('.pl-cat').forEach(b => b.onclick = () => { curCat = b.dataset.cat; applyPlFilter(); });
    applyPlFilter();

    // 私人模式：口袋名單「去過了」打卡（存瀏覽器 localStorage）
    if (isPriv()) {
      const visited = getVisited();
      pv.querySelectorAll('.pl-chk').forEach(b => {
        const k = b.dataset.k;
        const sync = () => {
          const on = visited.has(k);
          b.textContent = on ? '✅' : '⬜';
          b.closest('li').classList.toggle('done', on);
        };
        sync();
        b.onclick = () => { visited.has(k) ? visited.delete(k) : visited.add(k); saveVisited(visited); sync(); };
      });
    }
  }

  // ── 旅遊海報：Canvas 產生 1080×1920 分享圖（IG 限動比例）──
  const posterUI = document.createElement('div');
  posterUI.className = 'poster-backdrop';
  posterUI.hidden = true;
  posterUI.innerHTML = `<div class="poster-box">
    <canvas id="poster-cv" width="1080" height="1920"></canvas>
    <div class="poster-actions">
      <button class="wc-btn primary" id="poster-dl">⬇️ 下載海報</button>
      <button class="wc-btn ig" id="poster-close">關閉</button>
    </div></div>`;
  document.body.appendChild(posterUI);
  let posterName = 'poster.png';
  posterUI.addEventListener('click', e => { if (e.target === posterUI) posterUI.hidden = true; });
  posterUI.querySelector('#poster-close').onclick = () => posterUI.hidden = true;
  posterUI.querySelector('#poster-dl').onclick = () => {
    document.getElementById('poster-cv').toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = posterName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    });
  };

  function drawPoster(t) {
    const cv = document.getElementById('poster-cv');
    const x = cv.getContext('2d');
    const W = 1080, H = 1920, ACC = '#4a6c8c';
    const FONT = '-apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif';
    const set = (weight, size, color, ls) => {
      x.font = `${weight} ${size}px ${FONT}`;
      x.fillStyle = color;
      try { x.letterSpacing = ls || '0px'; } catch (e) {}
    };
    // 依寬度斷行（中文逐字量測）
    const wrap = (s, maxW, maxLines) => {
      const lines = []; let cur = '';
      for (const ch of s) {
        if (x.measureText(cur + ch).width > maxW && cur) { lines.push(cur); cur = ch; }
        else cur += ch;
        if (lines.length === maxLines) return lines;
      }
      if (cur) lines.push(cur);
      return lines;
    };

    x.clearRect(0, 0, W, H);
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillStyle = '#fdfcfa'; x.fillRect(0, 0, W, H);

    // 頁首
    set(600, 30, '#9aa0a8', '12px');
    x.fillText("EVA'S TRAVEL MAP", W / 2, 130);
    x.strokeStyle = '#dfe3e8'; x.lineWidth = 2;
    x.beginPath(); x.moveTo(W / 2 - 72, 172); x.lineTo(W / 2 + 72, 172); x.stroke();

    // 國旗 + 標題（最多兩行）+ 日期
    set(400, 56, '#1f2328');
    x.fillText(t.countries.map(flagEmoji).join('  '), W / 2, 254);
    set(700, 82, '#1f2328');
    const tls = wrap(t.title, 880, 2);
    tls.forEach((l, j) => x.fillText(l, W / 2, 372 + j * 104));
    const tdays = Math.round((new Date(t.dateEnd) - new Date(t.dateStart)) / 86400000) + 1;
    set(500, 38, '#6a737d', '3px');
    x.fillText(`${fmtRange(t)}｜${tdays} 天`, W / 2, 372 + tls.length * 104);

    // 中段：城市星圖（等距投影到面板內，虛線連成路線）
    const px0 = 100, px1 = 980, py0 = 640, py1 = 1500, pad = 120;
    const rr = (a, b, c, d, r) => { x.beginPath(); x.roundRect(a, b, c - a, d - b, r); };
    x.fillStyle = '#ffffff'; rr(px0, py0, px1, py1, 30); x.fill();
    x.strokeStyle = '#ececec'; x.lineWidth = 2.5; rr(px0, py0, px1, py1, 30); x.stroke();

    const seen = new Set();
    const pts = (t.cities || []).filter(c => c.lat != null).filter(c => {
      const k = c.name + c.lat; if (seen.has(k)) return false; seen.add(k); return true;
    });
    if (pts.length) {
      const lats = pts.map(c => c.lat), lngs = pts.map(c => c.lng);
      const dLat = Math.max(...lats) - Math.min(...lats) || 1e-6;
      const dLng = Math.max(...lngs) - Math.min(...lngs) || 1e-6;
      const availW = (px1 - px0) - pad * 2, availH = (py1 - py0) - pad * 2;
      const sc = Math.min(availW / dLng, availH / dLat);
      const cx = (Math.min(...lngs) + Math.max(...lngs)) / 2;
      const cy = (Math.min(...lats) + Math.max(...lats)) / 2;
      const P = c => [(px0 + px1) / 2 + (c.lng - cx) * sc, (py0 + py1) / 2 - (c.lat - cy) * sc];

      if (pts.length > 1) {
        x.strokeStyle = ACC; x.globalAlpha = .4; x.lineWidth = 5;
        x.setLineDash([1, 18]); x.lineCap = 'round';
        x.beginPath();
        pts.forEach((c, j) => { const [a, b] = P(c); j ? x.lineTo(a, b) : x.moveTo(a, b); });
        x.stroke();
        x.setLineDash([]); x.globalAlpha = 1;
      }
      for (const c of pts) {
        const [a, b] = P(c);
        x.save();
        x.shadowColor = ACC; x.shadowBlur = 26;
        x.fillStyle = ACC; x.beginPath(); x.arc(a, b, 13, 0, 7); x.fill();
        x.restore();
        x.fillStyle = '#fff'; x.beginPath(); x.arc(a, b, 5, 0, 7); x.fill();
      }
      // 城市標籤：防碰撞（上→下→右→左找空位，都擠不下就不標，密集區保持乾淨）
      const placed = [];
      set(500, 30, '#6a737d');
      for (const c of pts) {
        const [a, b] = P(c);
        const w = x.measureText(c.name).width + 16, h = 42;
        for (const [dx, dy, align] of [[0, -42, 'center'], [0, 46, 'center'], [28, 0, 'left'], [-28, 0, 'right']]) {
          const lx = a + dx, ly = b + dy;
          const x0 = align === 'center' ? lx - w / 2 : align === 'left' ? lx : lx - w;
          const r = { x0, y0: ly - h / 2, x1: x0 + w, y1: ly + h / 2 };
          if (r.x0 < px0 + 12 || r.x1 > px1 - 12 || r.y0 < py0 + 12 || r.y1 > py1 - 12) continue;
          if (placed.some(p => !(r.x1 < p.x0 || r.x0 > p.x1 || r.y1 < p.y0 || r.y0 > p.y1))) continue;
          x.textAlign = align;
          x.fillText(c.name, lx, ly);
          x.textAlign = 'center';
          placed.push(r);
          break;
        }
      }
    } else {
      set(400, 120, '#dfe3e8');
      x.fillText('✈️', W / 2, (py0 + py1) / 2);
    }

    // 路線文字（最多兩行）
    const rc = (t.cities || []).map(c => c.name).filter((n, j, a) => n && a.indexOf(n) === j);
    if (rc.length > 1) {
      set(600, 34, ACC);
      wrap(rc.join(' → '), 860, 2).forEach((l, j) => x.fillText(l, W / 2, 1580 + j * 52));
    }

    // 頁尾
    set(600, 36, '#1f2328');
    x.fillText('📸 @yiiihua_0319', W / 2, 1780);
    set(400, 26, '#9aa0a8', '3px');
    x.fillText('yiiihua0319.github.io/travel-map', W / 2, 1834);
  }

  panesEl.querySelectorAll('.poster-btn').forEach(b => b.onclick = () => {
    const t = myTrips[+b.dataset.i];
    drawPoster(t);
    posterName = 'eva-travel-' + t.id + '.png';
    posterUI.hidden = false;
  });

  // ── 未對應到旅程的遊記 ──
  const oa = document.getElementById('orphan-articles');
  if (orphan.length) {
    oa.innerHTML = '<h2 class="sec-title">✍️ 其他遊記</h2>';
    for (const f of orphan) {
      const amd = await loadText(f);
      if (!amd) continue;
      const sec = document.createElement('div');
      sec.className = 'md-section';
      sec.innerHTML = '<div class="md-body">' + renderMD(amd) + '</div>';
      oa.appendChild(sec);
    }
  }
})();
</script>
</body>
</html>
