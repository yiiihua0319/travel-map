<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國家遊記｜Eva's Travel Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header"></div>
<main>
  <div class="container">
    <a class="back-link" href="list.html">← 回旅程列表</a>
    <div id="content">載入中…</div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/common.js"></script>
<script>
document.getElementById('header').outerHTML = headerHTML('');

(async () => {
  const code = (new URLSearchParams(location.search).get('c') || '').toUpperCase();
  const [tripsData, countries, placesData] = await Promise.all([
    loadJSON('data/trips.json'), loadJSON('data/countries.json'),
    loadJSON('data/places.json').catch(() => ({}))
  ]);
  const info = countries[code];
  const el = document.getElementById('content');
  if (!info) { el.innerHTML = '<div class="empty-note">找不到這個國家 🥲</div>'; return; }

  document.title = info.name + '｜Eva\'s Travel Map';
  const myTrips = tripsData.trips
    .filter(t => t.countries.includes(code))
    .sort((a, b) => a.dateStart.localeCompare(b.dateStart));

  // 遊記（心得）依旅程分組
  const contentList = (info.content || []).map(c => typeof c === 'string' ? { file: c } : c);
  const byTrip = {};
  const orphan = [];
  for (const c of contentList) (c.trip ? (byTrip[c.trip] = byTrip[c.trip] || []).push(c.file) : orphan.push(c.file));

  el.innerHTML = `
    <div class="country-head">
      <span class="country-flag">${flagEmoji(code)}</span>
      <div><div class="page-title">${info.name}</div>
      <div class="page-sub" style="margin:0">${myTrips.length} 趟旅程</div></div>
    </div>
    ${info.ig?.length ? `<div class="ig-row">${info.ig.map(h =>
      `<a class="ig-chip" href="https://www.instagram.com/stories/highlights/${h.id}/" target="_blank" rel="noopener">📸 ${h.name}</a>`).join('')}</div>` : ''}
    <div id="trip-tabs"></div>
    <div id="trip-panes"></div>
    <div id="map-photo"></div>
    <div id="places"></div>
    <div id="orphan-articles"></div>`;

  // ── 分頁籤（多趟旅程以城市/旅程為單位）──
  const tabLabel = t => {
    let s = t.title.startsWith(info.name) ? t.title.slice(info.name.length) : t.title;
    if (!s) s = t.title;
    return s + '（' + t.dateStart.slice(2, 7).replace('-', '/') + '）';
  };
  const tabsEl = document.getElementById('trip-tabs');
  const panesEl = document.getElementById('trip-panes');
  let curTabIdx = myTrips.length > 1 ? '0' : null;   // 目前選中的城市分頁（null=單趟，不篩選）
  let curCat = 'all';                                 // 目前選中的分類
  let applyPlFilter = () => {};                        // 由口袋名單區塊指派
  if (myTrips.length > 1) {
    tabsEl.innerHTML = '<div class="tab-bar">' + myTrips.map((t, i) =>
      `<button class="tab-chip${i === 0 ? ' active' : ''}" data-i="${i}">${tabLabel(t)}</button>`).join('') + '</div>';
  }

  // ── 每趟旅程：行程 → 費用 → 心得 ──
  for (let i = 0; i < myTrips.length; i++) {
    const t = myTrips[i];
    const pane = document.createElement('section');
    pane.className = 'trip-block trip-pane';
    pane.dataset.i = i;
    if (myTrips.length > 1 && i !== 0) pane.style.display = 'none';

    let inner = `<div class="trip-head">
      <h2 class="trip-name">${t.title}</h2>
      <span class="trip-dates">${fmtRange(t)}</span>
    </div>`;

    // 1. 行程
    const md = await loadText('data/trips/' + t.id + '.md');
    if (md) inner += '<h3 class="part-title">🗓️ 行程</h3><div class="trip-md">' + renderTripMD(md) + '</div>';

    // 2. 費用
    if (t.expenses) inner += '<h3 class="part-title">💰 費用</h3>' + pieChartHTML(t.expenses);

    // 3. 心得（遊記）
    if (byTrip[t.id]?.length) {
      inner += '<h3 class="part-title">✍️ 心得</h3>';
      for (const f of [...new Set(byTrip[t.id])]) {
        const amd = await loadText(f);
        if (amd) inner += '<div class="md-section"><div class="md-body">' + renderMD(amd) + '</div></div>';
      }
    }
    if (!md && !t.expenses && !byTrip[t.id]?.length) {
      inner += '<div class="empty-note">這趟的紀錄整理中 ✈️</div>';
    }
    pane.innerHTML = inner;
    panesEl.appendChild(pane);
  }

  // 分頁切換
  tabsEl.querySelectorAll('.tab-chip').forEach(btn => btn.onclick = () => {
    tabsEl.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    panesEl.querySelectorAll('.trip-pane').forEach(p =>
      p.style.display = p.dataset.i === btn.dataset.i ? '' : 'none');
    curTabIdx = btn.dataset.i;
    applyPlFilter();   // 口袋名單同步只顯示這個城市
  });

  // ── 造訪地點小地圖 + 照片 ──
  const mp = document.getElementById('map-photo');
  const pins = [];
  for (const t of myTrips) for (const c of (t.cities || [])) pins.push(c);
  let mpHTML = '';
  if (pins.length) mpHTML += '<h2 class="sec-title">🗺️ 造訪地點</h2><div id="country-map"></div>';
  if (info.images?.length) {
    mpHTML += '<h2 class="sec-title">📷 照片</h2><div class="img-grid">' +
      info.images.map(u => `<img src="${u}" loading="lazy" alt="${info.name}">`).join('') + '</div>';
  }
  mp.innerHTML = mpHTML;

  if (pins.length) {
    const cmap = L.map('country-map', { scrollWheelZoom: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 14
    }).addTo(cmap);
    const group = [], seen = new Set();
    for (const p of pins) {
      const key = p.lat + ',' + p.lng;
      if (seen.has(key)) continue; seen.add(key);
      group.push(L.circleMarker([p.lat, p.lng], {
        radius: 6, color: '#4a6c8c', weight: 1.5, fillColor: '#4a6c8c', fillOpacity: .55
      }).addTo(cmap).bindPopup('📍 ' + p.name));
    }
    if (group.length === 1) cmap.setView(group[0].getLatLng(), 6);
    else cmap.fitBounds(L.featureGroup(group).getBounds().pad(0.4));
  }

  // ── 口袋名單（Google Maps 已儲存地點）──
  const pv = document.getElementById('places');
  const groups = placesData[code] || [];
  if (groups.length) {
    const CATMETA = { food: ['🍜', '美食'], sight: ['🏞️', '景點'], shop: ['🛍️', '購物'], stay: ['🏨', '住宿'], other: ['📍', '其他'] };
    const catOf = c => CATMETA[c] || CATMETA.other;

    // 每個清單對應到哪幾趟旅程（比對旅程標題是否含城市名；關西 = 京都/神戶/大阪）
    const matchTrip = (listName, t) =>
      t.title.includes(listName) || (t.title.includes('關西') && ['京都', '神戶', '大阪'].includes(listName));

    // 分類統計（全國）
    const catCount = {};
    for (const g of groups) for (const p of g.places) catCount[p.cat] = (catCount[p.cat] || 0) + 1;
    const totalP = groups.reduce((s, g) => s + g.places.length, 0);

    let ph = `<h2 class="sec-title">📍 我的口袋名單 <span class="pl-count" id="pl-count">${totalP} 個地點</span></h2>`;
    // 分類篩選列
    ph += '<div class="pl-cat-bar"><button class="pl-cat active" data-cat="all">全部</button>';
    for (const k of ['food', 'sight', 'shop', 'stay', 'other'])
      if (catCount[k]) ph += `<button class="pl-cat" data-cat="${k}">${catOf(k)[0]} ${catOf(k)[1]} <span class="pl-catn">${catCount[k]}</span></button>`;
    ph += '</div><div class="pl-groups">';

    for (const g of groups) {
      const idxs = myTrips.map((t, i) => matchTrip(g.list, t) ? i : -1).filter(i => i >= 0);
      const attr = idxs.length ? ` data-trips="${idxs.join(',')}"` : ' data-all';
      ph += `<details class="pl-group"${groups.length <= 2 ? ' open' : ''}${attr}>
        <summary>${g.list}<span class="pl-n">${g.places.length}</span></summary>
        <ul class="pl-list">` +
        g.places.map(p => `<li data-cat="${p.cat || 'other'}"><span class="pl-emoji">${catOf(p.cat)[0]}</span><a href="${p.url}" target="_blank" rel="noopener">${p.name}</a>${p.note ? `<span class="pl-note">${p.note}</span>` : ''}</li>`).join('') +
        '</ul></details>';
    }
    ph += '</div>';
    pv.innerHTML = ph;

    // 篩選：城市（分頁）＋分類（篩選列）
    applyPlFilter = () => {
      let shown = 0;
      pv.querySelectorAll('.pl-group').forEach(gr => {
        const cityOK = curTabIdx === null || gr.hasAttribute('data-all') ||
          (gr.dataset.trips || '').split(',').includes(curTabIdx);
        let liShown = 0;
        gr.querySelectorAll('li').forEach(li => {
          const vis = cityOK && (curCat === 'all' || li.dataset.cat === curCat);
          li.style.display = vis ? '' : 'none';
          if (vis) { liShown++; shown++; }
        });
        gr.style.display = (cityOK && liShown) ? '' : 'none';
        gr.querySelector('.pl-n').textContent = liShown;
      });
      document.getElementById('pl-count').textContent = shown + ' 個地點';
    };
    pv.querySelectorAll('.pl-cat').forEach(b => b.onclick = () => {
      pv.querySelectorAll('.pl-cat').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      curCat = b.dataset.cat;
      applyPlFilter();
    });
    applyPlFilter();
  }

  // ── 未對應到旅程的遊記 ──
  const oa = document.getElementById('orphan-articles');
  if (orphan.length) {
    oa.innerHTML = '<h2 class="sec-title">✍️ 其他遊記</h2>';
    for (const f of orphan) {
      const amd = await loadText(f);
      if (!amd) continue;
      const sec = document.createElement('div');
      sec.className = 'md-section';
      sec.innerHTML = '<div class="md-body">' + renderMD(amd) + '</div>';
      oa.appendChild(sec);
    }
  }
})();
</script>
</body>
</html>
