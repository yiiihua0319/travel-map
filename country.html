<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國家遊記｜Eva's Travel Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header"></div>
<main>
  <div class="container">
    <a class="back-link" href="list.html">← 回旅程列表</a>
    <div id="content">載入中…</div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/common.js"></script>
<script>
document.getElementById('header').outerHTML = headerHTML('');

(async () => {
  const code = (new URLSearchParams(location.search).get('c') || '').toUpperCase();
  const [tripsData, countries] = await Promise.all([
    loadJSON('data/trips.json'), loadJSON('data/countries.json')
  ]);
  const info = countries[code];
  const el = document.getElementById('content');
  if (!info) { el.innerHTML = '<div class="empty-note">找不到這個國家 🥲</div>'; return; }

  document.title = info.name + '｜Eva\'s Travel Map';
  const myTrips = tripsData.trips
    .filter(t => t.countries.includes(code))
    .sort((a, b) => a.dateStart.localeCompare(b.dateStart));

  el.innerHTML = `
    <div class="country-head">
      <span class="country-flag">${flagEmoji(code)}</span>
      <div><div class="page-title">${info.name}</div>
      <div class="page-sub" style="margin:0">${myTrips.length} 趟旅程</div></div>
    </div>
    ${info.ig?.length ? `<div class="ig-row">${info.ig.map(h =>
      `<a class="ig-chip" href="https://www.instagram.com/stories/highlights/${h.id}/" target="_blank" rel="noopener">📸 ${h.name}</a>`).join('')}</div>` : ''}
    <div id="trip-blocks"></div>
    <div id="map-photo"></div>
    <div id="articles"></div>`;

  // ── 1. 行程（Day 卡片）+ 花費圓餅圖，置頂 ──
  const blocks = document.getElementById('trip-blocks');
  for (const t of myTrips) {
    const sec = document.createElement('section');
    sec.className = 'trip-block';
    let inner = `<div class="trip-head">
      <h2 class="trip-name">${t.title}</h2>
      <span class="trip-dates">${fmtRange(t)}</span>
    </div>`;
    const md = await loadText('data/trips/' + t.id + '.md');
    if (md) inner += '<div class="trip-md">' + renderTripMD(md) + '</div>';
    if (t.expenses) inner += pieChartHTML(t.expenses);
    sec.innerHTML = inner;
    blocks.appendChild(sec);
  }

  // ── 2. 該國城市小地圖 + 照片 ──
  const mp = document.getElementById('map-photo');
  const pins = [];
  for (const t of myTrips) for (const c of (t.cities || [])) pins.push(c);
  let mpHTML = '';
  if (pins.length) mpHTML += '<h2 class="sec-title">🗺️ 造訪地點</h2><div id="country-map"></div>';
  if (info.images?.length) {
    mpHTML += '<h2 class="sec-title">📷 照片</h2><div class="img-grid">' +
      info.images.map(u => `<img src="${u}" loading="lazy" alt="${info.name}">`).join('') + '</div>';
  }
  mp.innerHTML = mpHTML;

  if (pins.length) {
    const cmap = L.map('country-map', { scrollWheelZoom: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 14
    }).addTo(cmap);
    const group = [], seen = new Set();
    for (const p of pins) {
      const key = p.lat + ',' + p.lng;
      if (seen.has(key)) continue; seen.add(key);
      group.push(L.circleMarker([p.lat, p.lng], {
        radius: 6, color: '#4a6c8c', weight: 1.5, fillColor: '#4a6c8c', fillOpacity: .55
      }).addTo(cmap).bindPopup('📍 ' + p.name));
    }
    if (group.length === 1) cmap.setView(group[0].getLatLng(), 6);
    else cmap.fitBounds(L.featureGroup(group).getBounds().pad(0.4));
  }

  // ── 3. 完整遊記 ──
  const art = document.getElementById('articles');
  if (info.content?.length) {
    art.innerHTML = '<h2 class="sec-title">✍️ 遊記</h2>';
    for (const path of info.content) {
      const md = await loadText(path);
      if (!md) continue;
      const sec = document.createElement('div');
      sec.className = 'md-section';
      sec.innerHTML = '<div class="md-body">' + renderMD(md) + '</div>';
      art.appendChild(sec);
    }
  } else if (!myTrips.some(t => true)) {
    art.innerHTML = '<div class="empty-note">詳細遊記整理中 ✈️</div>';
  }
})();
</script>
</body>
</html>
