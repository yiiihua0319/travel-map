<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅程列表｜Eva's Travel Map</title>
<meta name="description" content="48 趟旅程列表，依日期或國家瀏覽，可搜尋">
<meta property="og:title" content="旅程列表｜Eva's Travel Map">
<meta property="og:description" content="48 趟旅程列表，依日期或國家瀏覽，可搜尋">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yiiihua0319.github.io/travel-map/list.html">
<meta property="og:image" content="https://yiiihua0319.github.io/travel-map/assets/og-share.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
<link rel="stylesheet" href="css/style.css?v=20260709b">
</head>
<body>
<div id="header"></div>
<main>
  <div class="container">
    <div class="page-title">旅程列表</div>
    <div class="page-sub" id="sub">載入中…</div>
    <input class="search-box" id="q" type="search" placeholder="🔍 搜尋國家、城市、旅程或年份…" autocomplete="off">
    <div class="sort-toggle">
      <button id="btn-date" class="active">依日期</button>
      <button id="btn-country">依國家</button>
    </div>
    <div id="list"></div>
    <h2 class="sec-title">🧳 旅行小知識</h2>
    <div class="ig-row">
      <a class="ig-chip" href="tips.html?f=esn-card">💳 ESN Card 辦卡教學</a>
      <a class="ig-chip" href="tips.html?f=eurail">🚄 Eurail Pass 歐洲火車通票</a>
    </div>
  </div>
</main>

<script src="js/common.js"></script>
<script>
document.getElementById('header').outerHTML = headerHTML('list');

let trips = [], countries = {};

// 每趟旅程可被搜尋的文字：標題＋國家名＋國碼＋城市名＋年份
function searchText(t) {
  return [
    t.title,
    ...t.countries.map(cc => (countries[cc]?.name || '') + cc),
    ...(t.cities || []).map(c => c.name),
    t.dateStart.slice(0, 4)
  ].join(' ').toLowerCase();
}
function visibleTrips() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  if (!q) return trips;
  const terms = q.split(/\s+/); // 空格分隔＝AND
  return trips.filter(t => { const s = searchText(t); return terms.every(k => s.includes(k)); });
}

function flagLinks(t) {
  return t.countries.map(cc =>
    `<a href="country.html?c=${cc}&t=${t.id}" title="${countries[cc]?.name || cc}">${flagEmoji(cc)}</a>`).join('');
}

function rowHTML(t) {
  return `<div class="trip-row">
    <span class="trip-date">${fmtRange(t)}</span>
    <span class="trip-flags">${flagLinks(t)}</span>
    <a class="trip-title" href="country.html?c=${t.countries[0]}&t=${t.id}">${t.title}</a>
  </div>`;
}

function emptyHTML() {
  return '<div class="empty-note">找不到符合的旅程 🧐 換個關鍵字試試？</div>';
}

function renderByDate() {
  const vt = visibleTrips();
  if (!vt.length) { document.getElementById('list').innerHTML = emptyHTML(); return; }
  const sorted = [...vt].sort((a, b) => b.dateStart.localeCompare(a.dateStart));
  let html = '', year = '';
  for (const t of sorted) {
    const y = t.dateStart.slice(0, 4);
    if (y !== year) { year = y; html += `<div class="group-label">${y}</div>`; }
    html += rowHTML(t);
  }
  document.getElementById('list').innerHTML = html;
}

function renderByCountry() {
  const vt = visibleTrips();
  if (!vt.length) { document.getElementById('list').innerHTML = emptyHTML(); return; }
  const byC = new Map();
  for (const t of vt) for (const cc of t.countries) {
    if (!byC.has(cc)) byC.set(cc, []);
    byC.get(cc).push(t);
  }
  const order = [...byC.keys()].sort((a, b) =>
    (countries[a]?.name || a).localeCompare(countries[b]?.name || b, 'zh-Hant'));
  let html = '';
  for (const cc of order) {
    const list = byC.get(cc).sort((a, b) => b.dateStart.localeCompare(a.dateStart));
    html += `<div class="group-label"><a href="country.html?c=${cc}">${flagEmoji(cc)} ${countries[cc]?.name || cc}（${list.length}）→</a></div>`;
    html += list.map(rowHTML).join('');
  }
  document.getElementById('list').innerHTML = html;
}

(async () => {
  const [tripsData, cData] = await Promise.all([
    loadJSON('data/trips.json'), loadJSON('data/countries.json')
  ]);
  trips = tripsData.trips; countries = cData;
  const nC = new Set(trips.flatMap(t => t.countries)).size;
  document.getElementById('sub').textContent = `${trips.length} 趟旅程 · ${nC} 個國家`;
  renderByDate();

  const bd = document.getElementById('btn-date'), bc = document.getElementById('btn-country');
  bd.onclick = () => { bd.classList.add('active'); bc.classList.remove('active'); renderByDate(); };
  bc.onclick = () => { bc.classList.add('active'); bd.classList.remove('active'); renderByCountry(); };

  // 搜尋：邊打邊過濾，套用目前的排序模式
  const q = document.getElementById('q');
  q.addEventListener('input', () => {
    const vt = visibleTrips();
    document.getElementById('sub').textContent = q.value.trim()
      ? `找到 ${vt.length} 趟旅程`
      : `${trips.length} 趟旅程 · ${nC} 個國家`;
    bd.classList.contains('active') ? renderByDate() : renderByCountry();
  });
})();
</script>
</body>
</html>
