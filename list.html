<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅程列表｜Eva's Travel Map</title>
<meta name="description" content="50 趟旅程列表，依日期或國家瀏覽，可搜尋">
<meta property="og:title" content="旅程列表｜Eva's Travel Map">
<meta property="og:description" content="50 趟旅程列表，依日期或國家瀏覽，可搜尋">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yiiihua0319.github.io/travel-map/list.html">
<meta property="og:image" content="https://yiiihua0319.github.io/travel-map/assets/og-share.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
<link rel="stylesheet" href="css/style.css?v=20260720a">
</head>
<body>
<div id="header"></div>
<main>
  <div class="container">
    <div class="page-title" id="pt"></div>
    <div class="page-sub" id="sub"></div>
    <input class="search-box" id="q" type="search" placeholder="" autocomplete="off">
    <div class="sort-toggle">
      <button id="btn-date" class="active"></button>
      <button id="btn-country"></button>
    </div>
    <div id="list"></div>
    <h2 class="sec-title" id="tips-h"></h2>
    <div class="ig-row">
      <a class="ig-chip" id="tip-esn" href="tips.html?f=esn-card"></a>
      <a class="ig-chip" id="tip-eurail" href="tips.html?f=eurail"></a>
    </div>
  </div>
</main>

<script src="js/common.js"></script>
<script>
document.getElementById('header').outerHTML = headerHTML('list');

// 靜態文案依語言填入
document.getElementById('pt').textContent = T('listTitle');
document.getElementById('sub').textContent = T('loading');
document.getElementById('q').placeholder = T('searchPh');
document.getElementById('btn-date').textContent = T('sortDate');
document.getElementById('btn-country').textContent = T('sortCountry');
document.getElementById('tips-h').textContent = T('tipsHead');
document.getElementById('tip-esn').textContent = T('tipEsn');
document.getElementById('tip-eurail').textContent = T('tipEurail');
document.title = T('listTitle') + "｜Eva's Travel Map";

let trips = [], countries = {};

// 每趟旅程可被搜尋的文字：標題＋國家名＋國碼＋城市名＋年份
function searchText(t) {
  return [
    t.title, tripTitle(t),
    ...t.countries.map(cc => (countries[cc]?.name || '') + cName(cc, countries) + cc),
    ...(t.cities || []).map(c => c.name + ' ' + cityName(c.name)),
    t.dateStart.slice(0, 4)
  ].join(' ').toLowerCase();
}
function visibleTrips() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  if (!q) return trips;
  const terms = q.split(/\s+/); // 空格分隔＝AND
  return trips.filter(t => { const s = searchText(t); return terms.every(k => s.includes(k)); });
}

function flagLinks(t) {
  return t.countries.map(cc =>
    `<a href="country.html?c=${cc}&t=${t.id}" title="${cName(cc, countries)}">${flagEmoji(cc)}</a>`).join('');
}

function rowHTML(t) {
  return `<div class="trip-row">
    <span class="trip-date">${fmtRange(t)}</span>
    <span class="trip-flags">${flagLinks(t)}</span>
    <a class="trip-title" href="country.html?c=${t.countries[0]}&t=${t.id}">${tripTitle(t)}</a>
  </div>`;
}

function emptyHTML() {
  return '<div class="empty-note">' + T('noResult') + '</div>';
}

function renderByDate() {
  const vt = visibleTrips();
  if (!vt.length) { document.getElementById('list').innerHTML = emptyHTML(); return; }
  const sorted = [...vt].sort((a, b) => b.dateStart.localeCompare(a.dateStart));
  let html = '', year = '';
  for (const t of sorted) {
    const y = t.dateStart.slice(0, 4);
    if (y !== year) { year = y; html += `<div class="group-label">${y}</div>`; }
    html += rowHTML(t);
  }
  document.getElementById('list').innerHTML = html;
}

function renderByCountry() {
  const vt = visibleTrips();
  if (!vt.length) { document.getElementById('list').innerHTML = emptyHTML(); return; }
  const byC = new Map();
  for (const t of vt) for (const cc of t.countries) {
    if (!byC.has(cc)) byC.set(cc, []);
    byC.get(cc).push(t);
  }
  const order = [...byC.keys()].sort((a, b) =>
    cName(a, countries).localeCompare(cName(b, countries), isEN() ? 'en' : 'zh-Hant'));
  let html = '';
  for (const cc of order) {
    const list = byC.get(cc).sort((a, b) => b.dateStart.localeCompare(a.dateStart));
    html += `<div class="group-label"><a href="country.html?c=${cc}">${flagEmoji(cc)} ${cName(cc, countries)}${isEN() ? ` (${list.length})` : `（${list.length}）`} →</a></div>`;
    html += list.map(rowHTML).join('');
  }
  document.getElementById('list').innerHTML = html;
}

(async () => {
  const [tripsData, cData] = await Promise.all([
    loadJSON('data/trips.json'), loadJSON('data/countries.json'), I18N_READY
  ]);
  trips = tripsData.trips; countries = cData;
  const nC = new Set(trips.flatMap(t => t.countries)).size;
  const subText = () => isEN() ? `${trips.length} trips · ${nC} countries` : `${trips.length} 趟旅程 · ${nC} 個國家`;
  document.getElementById('sub').textContent = subText();
  renderByDate();

  const bd = document.getElementById('btn-date'), bc = document.getElementById('btn-country');
  bd.onclick = () => { bd.classList.add('active'); bc.classList.remove('active'); renderByDate(); };
  bc.onclick = () => { bc.classList.add('active'); bd.classList.remove('active'); renderByCountry(); };

  // 搜尋：邊打邊過濾，套用目前的排序模式
  const q = document.getElementById('q');
  q.addEventListener('input', () => {
    const vt = visibleTrips();
    document.getElementById('sub').textContent = q.value.trim()
      ? (isEN() ? `${vt.length} ${vt.length === 1 ? 'trip' : 'trips'} found` : `找到 ${vt.length} 趟旅程`)
      : subText();
    bd.classList.contains('active') ? renderByDate() : renderByCountry();
  });
})();
</script>
</body>
</html>
